<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Content Security Policy: restrict what the page can load/execute -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'unsafe-inline';
    style-src 'unsafe-inline';
    connect-src https://geocoding-api.open-meteo.com https://api.open-meteo.com https://nominatim.openstreetmap.org https://en.wikipedia.org https://api.frankfurter.app;
    img-src https://upload.wikimedia.org https://maps.wikimedia.org data:;
  " />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="no-referrer" />
  <title>Weather Dashboard</title>
  <style>
    html, body { height: 100%; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      transition: background-image 0.6s ease;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1040px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .loc-btn {
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    .loc-btn:hover { background: rgba(255,255,255,0.2); }
    .loc-btn:active { transform: scale(0.97); }
    .loc-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    input {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      backdrop-filter: blur(8px);
      outline: none;
      transition: background 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.4); }
    input:focus { background: rgba(255,255,255,0.18); }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 14px;
      background: #7c5cbf;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { background: #9370db; }
    button:active { transform: scale(0.97); }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 40px 44px;
      backdrop-filter: blur(16px);
      display: none;
      flex-direction: column;
      gap: 32px;
      animation: fadeUp 0.35s ease;
    }
    .card.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Horizontal main row ── */
    .card-main {
      display: flex;
      gap: 0;
      align-items: stretch;
    }

    /* Left panel — city + temperature */
    .card-left {
      flex: 0 0 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 40px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .city-name {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .country {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
      margin-bottom: 28px;
    }

    .main-temp {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .temp-icon { font-size: 4.5rem; line-height: 1; }
    .temp-value {
      font-size: 5.5rem;
      font-weight: 200;
      line-height: 1;
    }
    .temp-value sup { font-size: 2rem; font-weight: 400; vertical-align: super; }

    .condition {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.04em;
    }

    /* Right panel — stats */
    .card-right {
      flex: 1;
      padding-left: 40px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      height: 100%;
      align-content: center;
    }

    .stat {
      background: rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.45);
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1;
    }
    .stat-unit {
      font-size: 0.85rem;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
    }
    .stat-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* UV risk badge */
    .uv-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000;
      margin-top: 4px;
      width: fit-content;
    }
    .uv-low      { background: #4ade80; }
    .uv-moderate { background: #fbbf24; }
    .uv-high     { background: #fb923c; }
    .uv-veryhigh { background: #f87171; color: #fff; }
    .uv-extreme  { background: #c084fc; color: #fff; }

    /* Avg temp row */
    .avg-row {
      display: flex;
      gap: 10px;
      align-items: baseline;
    }
    .avg-high { font-size: 1.5rem; font-weight: 700; color: #fb923c; }
    .avg-low  { font-size: 1.1rem; font-weight: 500; color: #93c5fd; }

    .forecast {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .forecast-day {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 12px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .fc-day-name {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
    }

    .fc-icon { font-size: 1.4rem; line-height: 1; }

    .fc-high {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .fc-low {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
    }

    .error {
      text-align: center;
      color: #ff8080;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 0.95rem;
      display: none;
      animation: fadeUp 0.25s ease;
    }
    .error.visible { display: block; }

    .loading {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      display: none;
      margin-top: 20px;
    }
    .loading.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .conv-btn {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      background: #7c5cbf;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .conv-btn:hover { background: #9370db; }

    .currency-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.8);
      vertical-align: middle;
    }

    /* ── Currency widget — bottom-left ────────────── */
    .currency-widget {
      position: fixed;
      bottom: 24px;
      left: 28px;
      z-index: 10;
      width: 300px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 20px;
      padding: 18px 20px;
      backdrop-filter: blur(14px);
      display: none;
      animation: fadeUp 0.35s ease;
    }
    .currency-widget.visible { display: block; }

    .currency-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .currency-flag { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .currency-code {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1;
    }
    .currency-name {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
    }

    .currency-sep {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 14px;
    }

    .converter-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .converter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .conv-input {
      width: 72px;
      padding: 7px 8px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      min-width: 0;
    }
    .conv-input:focus { border-color: rgba(255,255,255,0.35); }
    .conv-select {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(30,20,60,0.85);
      color: #fff;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      min-width: 0;
    }
    .conv-select:focus { border-color: rgba(255,255,255,0.35); }
    .conv-arrow {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
    }
    .conv-swap {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      padding: 5px 7px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .conv-swap:hover { background: rgba(255,255,255,0.1); }

    .conv-result {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a78bfa;
      min-height: 1.4em;
    }
    .conv-result-label {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    /* ── Local-time clock ─────────────────────────── */
    .clock-widget {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 10;
      text-align: right;
      display: none; /* hidden until a city is loaded */
    }
    .clock-widget.visible { display: block; }

    .clock-time {
      font-size: 2.4rem;
      font-weight: 200;
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .clock-time .colon {
      opacity: 1;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0.2; } }

    .clock-ampm {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.6);
      margin-left: 4px;
      vertical-align: super;
    }

    .clock-date {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .clock-tz {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<!-- Currency converter — bottom-left corner -->
<div class="currency-widget" id="currency-widget">
  <div class="currency-header">
    <div class="currency-flag" id="curr-flag"></div>
    <div>
      <div class="currency-code" id="curr-code">—</div>
      <div class="currency-name" id="curr-name"></div>
    </div>
  </div>
  <div class="currency-sep"></div>
  <div class="converter-label">Convert</div>
  <div class="converter-row">
    <input type="number" class="conv-input" id="conv-amount" value="1" min="0" step="any" />
    <select class="conv-select" id="conv-from"></select>
    <span class="conv-arrow">→</span>
    <select class="conv-select" id="conv-to"></select>
    <button class="conv-swap" id="conv-swap" title="Swap">⇅</button>
  </div>
  <button class="conv-btn" id="conv-btn">Convert</button>
  <div class="conv-result" id="conv-result"></div>
  <div class="conv-result-label" id="conv-rate"></div>
</div>

<!-- Local-time clock — top-right corner -->
<div class="clock-widget" id="clock-widget">
  <div class="clock-time" id="clock-time"></div>
  <div class="clock-date" id="clock-date"></div>
  <div class="clock-tz"   id="clock-tz"></div>
</div>

<div class="container">
  <h1>Weather Dashboard</h1>

  <div class="search-row">
    <button class="loc-btn" id="loc-btn" title="Use my location">📍</button>
    <input id="city-input" type="text" placeholder="Enter a city name…" autocomplete="off" maxlength="100" />
    <button id="search-btn">Search</button>
  </div>

  <div class="error" id="error-box"></div>
  <div class="loading" id="loading"><span class="spinner"></span>Fetching weather…</div>

  <div class="card" id="weather-card">

    <!-- Horizontal main row: city/temp LEFT · stats RIGHT -->
    <div class="card-main">

      <div class="card-left">
        <div class="city-name" id="city-name"></div>
        <div class="country"   id="country"></div>
        <div class="main-temp">
          <div class="temp-icon"  id="temp-icon"></div>
          <div class="temp-value" id="temp-value"><sup>°C</sup></div>
        </div>
        <div class="condition" id="condition"></div>
      </div>

      <div class="card-right">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Humidity</div>
            <div class="stat-value" id="humidity">–<span class="stat-unit"> %</span></div>
          </div>
          <div class="stat">
            <div class="stat-label">Wind Speed</div>
            <div class="stat-value" id="wind">–<span class="stat-unit"> km/h</span></div>
          </div>
          <div class="stat">
            <div class="stat-label">UV Index</div>
            <div class="stat-value" id="uv-value">–</div>
            <div id="uv-badge"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Precipitation</div>
            <div class="stat-value" id="precip">–<span class="stat-unit"> mm</span></div>
            <div class="stat-sub" id="precip-sub"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Sunset</div>
            <div class="stat-value" id="sunset">–</div>
            <div class="stat-sub" id="sunrise-sub"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Today's Range</div>
            <div class="avg-row">
              <span class="avg-high" id="avg-high">–°</span>
              <span class="avg-low"  id="avg-low">–°</span>
            </div>
            <div class="stat-sub">High · Low</div>
          </div>
        </div>
      </div>

    </div><!-- /.card-main -->

    <!-- 7-day forecast — full width below -->
    <div class="forecast" id="forecast"></div>

  </div>
</div>

<script src="src/utils.js"></script>
<script>
  const input       = document.getElementById('city-input');
  const btn         = document.getElementById('search-btn');
  const locBtn      = document.getElementById('loc-btn');
  const card        = document.getElementById('weather-card');
  const errorBox    = document.getElementById('error-box');
  const loading     = document.getElementById('loading');
  const clockWidget = document.getElementById('clock-widget');
  const clockTime   = document.getElementById('clock-time');
  const clockDate   = document.getElementById('clock-date');
  const clockTz     = document.getElementById('clock-tz');

  let clockInterval = null;

  function startClock(timezone) {
    if (clockInterval) clearInterval(clockInterval);

    function tick() {
      const now = new Date();

      // Time — HH:MM:SS in the city's timezone
      const timeParts = new Intl.DateTimeFormat('en-US', {
        timeZone: timezone,
        hour:   '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true,
      }).formatToParts(now);

      const get = type => timeParts.find(p => p.type === type)?.value ?? '';
      const hh   = get('hour');
      const mm   = get('minute');
      const ss   = get('second');
      const ampm = get('dayPeriod');

      // Build time display with blinking colons
      clockTime.textContent = '';
      const addText = t => { const s = document.createElement('span'); s.textContent = t; clockTime.appendChild(s); };
      const addColon = () => { const c = document.createElement('span'); c.className = 'colon'; c.textContent = ':'; clockTime.appendChild(c); };
      addText(hh); addColon(); addText(mm); addColon(); addText(ss);
      const amEl = document.createElement('span');
      amEl.className = 'clock-ampm';
      amEl.textContent = ampm;
      clockTime.appendChild(amEl);

      // Date — e.g. "Monday, May 11"
      clockDate.textContent = new Intl.DateTimeFormat('en-US', {
        timeZone: timezone,
        weekday: 'long',
        month:   'long',
        day:     'numeric',
      }).format(now);

      // Timezone abbreviation + offset — e.g. "EDT · UTC−4"
      const tzAbbr  = new Intl.DateTimeFormat('en-US', { timeZone: timezone, timeZoneName: 'short'  }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value ?? '';
      const tzLong  = new Intl.DateTimeFormat('en-US', { timeZone: timezone, timeZoneName: 'longOffset' }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value ?? '';
      clockTz.textContent = tzLong ? `${tzAbbr} · ${tzLong}` : tzAbbr;
    }

    tick();
    clockInterval = setInterval(tick, 1000);
    clockWidget.classList.add('visible');
  }

  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
    card.classList.remove('visible');
    loading.classList.remove('visible');
  }

  function showLoading() {
    loading.classList.add('visible');
    errorBox.classList.remove('visible');
    card.classList.remove('visible');
  }

  function makeEl(tag, cls, text) {
    const el = document.createElement(tag);
    el.className = cls;
    if (text !== undefined) el.textContent = text;
    return el;
  }

  function renderForecast(daily) {
    const container = document.getElementById('forecast');
    container.textContent = ''; // safer than innerHTML = ''
    const len = Math.min(daily.time.length, 7); // guard against unexpected payload sizes
    for (let i = 0; i < len; i++) {
      const code = Number(daily.weather_code[i]);
      const high = Math.round(Number(daily.temperature_2m_max[i]));
      const low  = Math.round(Number(daily.temperature_2m_min[i]));
      if (!isFinite(high) || !isFinite(low)) continue; // skip malformed rows
      const date    = new Date(String(daily.time[i]) + 'T12:00:00');
      const dayName = i === 0 ? 'Today' : DAY_NAMES[date.getDay()];
      const [, icon] = getCondition(code);

      const card = makeEl('div', 'forecast-day');
      card.appendChild(makeEl('div', 'fc-day-name', dayName));
      card.appendChild(makeEl('div', 'fc-icon',     icon));
      card.appendChild(makeEl('div', 'fc-high',     `${high}°`));
      card.appendChild(makeEl('div', 'fc-low',      `${low}°`));
      container.appendChild(card);
    }
  }

  async function fetchWeatherByCoords(latitude, longitude, cityLabel, countryLabel, countryCode = '') {
    const wxRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
      `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,is_day,uv_index,precipitation` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset` +
      `&wind_speed_unit=kmh&timezone=auto`
    );
    const wxData = await wxRes.json();
    const cur = wxData.current;
    // Validate all numeric fields before rendering
    const temp     = Math.round(Number(cur.temperature_2m));
    const humidity = Number(cur.relative_humidity_2m);
    const wind     = Math.round(Number(cur.wind_speed_10m));
    if (!isFinite(temp) || !isFinite(humidity) || !isFinite(wind)) {
      throw new Error('Unexpected API response format.');
    }
    // is_day: 1 = daytime, 0 = night — validate as integer before use
    const isDay = Number(cur.is_day) === 1;
    const [condLabel, condIcon] = getCondition(Number(cur.weather_code), isDay);

    document.getElementById('city-name').textContent = cityLabel;
    document.getElementById('country').textContent   = countryLabel;
    document.getElementById('temp-icon').textContent = condIcon;

    // Build temp element safely via DOM (avoids innerHTML)
    const tempEl = document.getElementById('temp-value');
    tempEl.textContent = `${temp}`;
    const sup = document.createElement('sup');
    sup.textContent = '°C';
    tempEl.appendChild(sup);

    document.getElementById('condition').textContent = condLabel;

    const humEl = document.getElementById('humidity');
    humEl.textContent = `${humidity}`;
    const humUnit = document.createElement('span');
    humUnit.className = 'stat-unit';
    humUnit.textContent = ' %';
    humEl.appendChild(humUnit);

    const windEl = document.getElementById('wind');
    windEl.textContent = `${wind}`;
    const windUnit = document.createElement('span');
    windUnit.className = 'stat-unit';
    windUnit.textContent = ' km/h';
    windEl.appendChild(windUnit);

    // ── UV Index ──────────────────────────────────
    const uv = Math.round(Number(cur.uv_index));
    const uvEl = document.getElementById('uv-value');
    uvEl.textContent = isFinite(uv) ? String(uv) : '–';
    const uvBadgeEl = document.getElementById('uv-badge');
    uvBadgeEl.textContent = '';
    if (isFinite(uv)) {
      const [riskLabel, riskClass] = uvRisk(uv);
      const badge = document.createElement('span');
      badge.className = `uv-badge ${riskClass}`;
      badge.textContent = riskLabel;
      uvBadgeEl.appendChild(badge);
    }

    // ── Precipitation ─────────────────────────────
    const precip = Number(cur.precipitation);
    const precipEl = document.getElementById('precip');
    precipEl.textContent = isFinite(precip) ? precip.toFixed(1) : '–';
    const precipUnit = document.createElement('span');
    precipUnit.className = 'stat-unit';
    precipUnit.textContent = ' mm';
    precipEl.appendChild(precipUnit);
    document.getElementById('precip-sub').textContent =
      isFinite(precip) ? (precip === 0 ? 'No precipitation' : 'Last hour') : '';

    // ── Sunset & Sunrise ──────────────────────────
    const sunsetRaw  = wxData.daily?.sunset?.[0]  ?? '';
    const sunriseRaw = wxData.daily?.sunrise?.[0] ?? '';
    document.getElementById('sunset').textContent    = parseDailyTime(sunsetRaw);
    document.getElementById('sunrise-sub').textContent =
      sunriseRaw ? `Sunrise ${parseDailyTime(sunriseRaw)}` : '';

    // ── Today's High / Low ────────────────────────
    const todayHigh = Math.round(Number(wxData.daily?.temperature_2m_max?.[0]));
    const todayLow  = Math.round(Number(wxData.daily?.temperature_2m_min?.[0]));
    document.getElementById('avg-high').textContent = isFinite(todayHigh) ? `${todayHigh}°` : '–°';
    document.getElementById('avg-low').textContent  = isFinite(todayLow)  ? `${todayLow}°`  : '–°';

    renderForecast(wxData.daily);

    // Start live clock in the city's local timezone
    const timezone = wxData.timezone || 'UTC';
    startClock(timezone);

    loading.classList.remove('visible');
    card.classList.add('visible');
    showCurrencyWidget(countryLabel, countryCode);
  }

  async function fetchWeather() {
    const city = input.value.trim();
    if (!city) return;
    showLoading();
    try {
      const geoRes = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
      );
      const geoData = await geoRes.json();
      if (!geoData.results?.length) {
        showError('City not found. Try a different spelling.');
        return;
      }
      const { name, country, country_code, latitude, longitude } = geoData.results[0];
      await fetchWeatherByCoords(latitude, longitude, name, country, country_code);
      setCityBackground(name);
    } catch {
      showError('Network error. Please check your connection and try again.');
    }
  }

  async function fetchWeatherByLocation() {
    if (!navigator.geolocation) {
      showError('Geolocation is not supported by your browser.');
      return;
    }
    locBtn.disabled = true;
    showLoading();
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude, longitude } = pos.coords;
        const revRes = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
        );
        const revData = await revRes.json();
        const city        = revData.address?.city || revData.address?.town || revData.address?.village || 'My Location';
        const country     = revData.address?.country || '';
        const countryCode = (revData.address?.country_code || '').toUpperCase();
        input.value = city;
        await fetchWeatherByCoords(latitude, longitude, city, country, countryCode);
        setCityBackground(city);
      } catch {
        showError('Could not retrieve location weather. Please try again.');
      } finally {
        locBtn.disabled = false;
      }
    }, () => {
      showError('Location access denied. Please search by city name.');
      locBtn.disabled = false;
    });
  }

  async function setCityBackground(cityName) {
    try {
      const res = await fetch(
        `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(cityName)}`
      );
      if (!res.ok) return;
      const data = await res.json();
      const imgUrl = data.originalimage?.source || data.thumbnail?.source;
      if (!imgUrl || !isSafeImageUrl(imgUrl)) return; // reject any unexpected URL
      const img = new Image();
      img.onload = () => {
        // CSS-escape single quotes so the URL can never break out of url('...')
        document.body.style.backgroundImage = `url('${imgUrl.replace(/'/g, '%27')}')`;
      };
      img.src = imgUrl;
    } catch {
      // silently fail — keep gradient
    }
  }

  // ── Currency converter ────────────────────────────
  function populateCurrencySelects(fromCode) {
    const fromSel = document.getElementById('conv-from');
    const toSel   = document.getElementById('conv-to');
    const prevTo  = toSel.value || 'USD';
    fromSel.textContent = '';
    toSel.textContent   = '';
    const allCodes = CURRENCIES.includes(fromCode)
      ? CURRENCIES
      : [fromCode, ...CURRENCIES];
    allCodes.forEach(c => {
      const label = `${c} – ${CURRENCY_NAMES[c] || c}`;
      const toSelected = c === prevTo && prevTo !== fromCode
        ? true
        : (prevTo === fromCode && c === 'USD');

      const optFrom = document.createElement('option');
      optFrom.value    = c;
      optFrom.selected = c === fromCode;
      optFrom.textContent = label;
      fromSel.appendChild(optFrom);

      const optTo = document.createElement('option');
      optTo.value    = c;
      optTo.selected = toSelected;
      optTo.textContent = label;
      toSel.appendChild(optTo);
    });
  }

  async function convertCurrency() {
    const amount  = parseFloat(document.getElementById('conv-amount').value);
    const from    = document.getElementById('conv-from').value;
    const to      = document.getElementById('conv-to').value;
    const resultEl = document.getElementById('conv-result');
    const rateEl   = document.getElementById('conv-rate');
    if (!amount || isNaN(amount) || from === to) {
      resultEl.textContent = from === to ? `${amount} ${from}` : '—';
      rateEl.textContent = '';
      return;
    }
    resultEl.textContent = '…';
    rateEl.textContent   = '';
    try {
      const res  = await fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`);
      const data = await res.json();
      const r    = data.rates[to];
      if (!r) throw new Error();
      const converted = (amount * r).toLocaleString('en', { maximumFractionDigits: 2 });
      resultEl.textContent = `${amount.toLocaleString('en')} ${from} = ${converted} ${to}`;
      rateEl.textContent   = `1 ${from} = ${r.toFixed(4)} ${to}`;
    } catch {
      resultEl.textContent = 'Rate unavailable';
    }
  }

  function showCurrencyWidget(countryLabel, countryCode) {
    const currency = COUNTRY_CURRENCY[countryLabel] || null;
    document.getElementById('curr-flag').textContent = countryFlag(countryCode);
    document.getElementById('curr-code').textContent = currency || '—';
    document.getElementById('curr-name').textContent = currency ? (CURRENCY_NAMES[currency] || '') : 'Unknown currency';
    populateCurrencySelects(currency || 'USD');
    document.getElementById('conv-result').textContent = '';
    document.getElementById('conv-rate').textContent   = '';
    document.getElementById('currency-widget').classList.add('visible');
  }

  document.getElementById('conv-btn').addEventListener('click', convertCurrency);
  document.getElementById('conv-amount').addEventListener('keydown', e => { if (e.key === 'Enter') convertCurrency(); });
  document.getElementById('conv-swap').addEventListener('click', () => {
    const fromSel = document.getElementById('conv-from');
    const toSel   = document.getElementById('conv-to');
    [fromSel.value, toSel.value] = [toSel.value, fromSel.value];
  });

  btn.addEventListener('click', fetchWeather);
  locBtn.addEventListener('click', fetchWeatherByLocation);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });
</script>
</body>
</html>
